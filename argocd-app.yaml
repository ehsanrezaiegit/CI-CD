apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fastapi-gitops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ehsanrezaiegit/CI-CD'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
